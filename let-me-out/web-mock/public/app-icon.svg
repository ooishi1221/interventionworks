<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#5a0820"/>
      <stop offset="60%" stop-color="#1a0410"/>
      <stop offset="100%" stop-color="#0a0205"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8c8"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#a06800"/>
    </linearGradient>
    <linearGradient id="rays" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,215,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,100,200,0.35)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 放射光 -->
  <g opacity="0.6" filter="url(#glow)">
    <polygon points="256,256 0,80 0,432" fill="url(#rays)"/>
    <polygon points="256,256 512,80 512,432" fill="url(#rays)"/>
  </g>

  <!-- 金縁 -->
  <rect x="14" y="14" width="484" height="484" fill="none" stroke="url(#gold)" stroke-width="6" rx="64" ry="64"/>
  <rect x="32" y="32" width="448" height="448" fill="none" stroke="#ffd700" stroke-width="2" rx="52" ry="52" opacity="0.5"/>

  <!-- 「放」の文字（業界擬態：中華放置 RPG）-->
  <text x="256" y="356"
        font-family="'Songti SC','STSong','Hiragino Mincho ProN',serif"
        font-size="320"
        font-weight="900"
        fill="url(#gold)"
        text-anchor="middle"
        stroke="#3a0510"
        stroke-width="6"
        paint-order="stroke fill">放</text>

  <!-- 飾り点（中華 SSR 演出）-->
  <circle cx="68" cy="68" r="6" fill="#ffd700"/>
  <circle cx="444" cy="68" r="6" fill="#ffd700"/>
  <circle cx="68" cy="444" r="6" fill="#ffd700"/>
  <circle cx="444" cy="444" r="6" fill="#ffd700"/>
</svg>
